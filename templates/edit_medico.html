{% extends "base.html" %}

{% block content %}
<h2>Editar Médico</h2>
<form method="post" class="admin-form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label for="nome_medico">Nome do Médico:</label>
    <input type="text" id="nome_medico" name="nome_medico" value="{{ medico.nome }}" required>
    <label for="crm">CRM:</label>
    <input type="number" id="crm" name="crm" value="{{ medico.crm }}" required>
    <label for="cor_medico">Cor:</label>
    <input type="color" id="cor_medico" name="cor_medico" value="{{ medico.cor }}">
    <button type="submit">Salvar alterações</button>
</form>
<p><a class="secondary-btn" href="{{ url_for('admin') }}">Voltar para Admin</a></p>
{% endblock %}
