{% extends "base.html" %}

{% block content %}
<h2>{% if agendamento %}Editar{% else %}Novo{% endif %} Agendamento</h2>
<form method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <input type="hidden" name="context_year" value="{{ return_context.year }}">
    <input type="hidden" name="context_month" value="{{ return_context.month }}">
    <input type="hidden" name="context_view" value="{{ return_context.view }}">
    <input type="hidden" name="context_medico" value="{{ return_context.medico or '' }}">
    <input type="hidden" name="context_protocolo" value="{{ return_context.protocolo or '' }}">
    <input type="hidden" name="context_paciente_busca" value="{{ return_context.paciente_busca or '' }}">
    {% if agendamento %}
    <label for="agendamento_id">ID do Agendamento:</label>
    <input type="text" id="agendamento_id" value="{{ agendamento.id }}" readonly>
    {% endif %}
    <label for="protocolo">Protocolo:</label>
    <input type="text" id="protocolo" name="protocolo" value="{{ agendamento.protocolo if agendamento else '' }}" placeholder="Digite o protocolo do paciente">
    <p class="form-helper-text">Se o protocolo existe, o nome e telefone do paciente serao preenchidos automaticamente.</p>
    <label for="nome_paciente">Nome do Paciente:</label>
    <input type="text" id="nome_paciente" name="nome_paciente" value="{{ agendamento.nome_paciente if agendamento else '' }}" required>
    <label for="whatsapp_paciente">Telefone do Paciente:</label>
    <input type="text" id="whatsapp_paciente" name="whatsapp_paciente" value="{{ agendamento.whatsapp_paciente if agendamento else '' }}" placeholder="Ex.: 11999999999">
    <label for="nome_medico">Nome do Médico:</label>
    <input type="text" id="nome_medico" name="nome_medico" value="{{ agendamento.nome_medico if agendamento else '' }}" required>
    <label for="crm_medico">CRM do Médico:</label>
    <input type="number" id="crm_medico" name="crm_medico" value="{{ agendamento.crm_medico if agendamento else '' }}" required>
    <label for="procedimento">Procedimento:</label>
    <input type="text" id="procedimento" name="procedimento" value="{{ agendamento.procedimento if agendamento else '' }}" required>
    <label for="cid_procedimento">CID do Procedimento:</label>
    <input type="text" id="cid_procedimento" name="cid_procedimento" value="{{ agendamento.cid_procedimento if agendamento else '' }}" required>
    <label for="data">Data:</label>
    <input type="date" id="data" name="data" value="{{ agendamento.data.strftime('%Y-%m-%d') if agendamento else selected_date|default('') }}" required>
    <label for="hora">Hora:</label>
    <input type="time" id="hora" name="hora" value="{{ agendamento.hora.strftime('%H:%M') if agendamento else '' }}" required>
    <label for="observacao">Observação:</label>
    <textarea id="observacao" name="observacao">{{ agendamento.observacao if agendamento else '' }}</textarea>
    <button type="submit">Salvar</button>
</form>
<script>
    const medicos = {{ medicos|tojson }};
    const procedimentos = {{ procedimentos|tojson }};
    const nomeMedicoInput = document.getElementById('nome_medico');
    const crmInput = document.getElementById('crm_medico');
    const procedimentoInput = document.getElementById('procedimento');
    const cidInput = document.getElementById('cid_procedimento');
    const protocoloInput = document.getElementById('protocolo');
    const nomePacienteInput = document.getElementById('nome_paciente');
    const whatsappInput = document.getElementById('whatsapp_paciente');

    function findMedico(nome) {
        return medicos.find(m => m.nome.toLowerCase().trim() === nome.toLowerCase().trim());
    }

    function findProcedimento(nome) {
        return procedimentos.find(p => p.nome.toLowerCase().trim() === nome.toLowerCase().trim());
    }

    protocoloInput.addEventListener('blur', () => {
        const protocolo = (protocoloInput.value || '').trim().toUpperCase();
        if (!protocolo) {
            return;
        }

        fetch('/api/paciente-por-protocolo?protocolo=' + encodeURIComponent(protocolo))
            .then(function(response) {
                if (!response.ok) {
                    throw new Error('not_found');
                }
                return response.json();
            })
            .then(function(data) {
                if (!data.ok) {
                    throw new Error('invalid');
                }
                nomePacienteInput.value = data.nome_paciente || '';
                whatsappInput.value = data.whatsapp_paciente || '';
            })
            .catch(function() {
                // Silenciosamente ignora se protocolo nao encontrado
            });
    });

    nomeMedicoInput.addEventListener('blur', () => {
        const medico = findMedico(nomeMedicoInput.value);
        if (medico) {
            crmInput.value = medico.crm;
        }
    });

    procedimentoInput.addEventListener('blur', () => {
        const procedimento = findProcedimento(procedimentoInput.value);
        if (procedimento && !cidInput.value.trim()) {
            cidInput.value = procedimento.cid;
        }
    });

    document.querySelector('form').addEventListener('submit', () => {
        const procedimento = findProcedimento(procedimentoInput.value);
        const enteredCid = cidInput.value.trim();
        if (procedimento && enteredCid && enteredCid !== procedimento.cid) {
            const parts = enteredCid.split('-').map(p => p.trim());
            if (!parts.includes(procedimento.cid)) {
                cidInput.value = `${enteredCid} - ${procedimento.cid}`;
            }
        }
    });
</script>
{% endblock %}
