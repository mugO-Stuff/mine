{% extends "base.html" %}

{% block content %}
<div class="chat-page">
    <div class="chat-header">
        <h2>Chat Interno</h2>
        <p>Mensagens visíveis apenas para usuários logados. Histórico de até 30 dias.</p>
        <p id="chat-notice" class="chat-notice" style="display:none;">Você recebeu novas mensagens.</p>
    </div>

    <div id="chat-messages" class="chat-messages" aria-live="polite"></div>

    <form id="chat-form" class="chat-form" autocomplete="off">
        <input type="text" id="chat-input" maxlength="1500" placeholder="Digite sua mensagem..." required>
        <button type="submit">Enviar</button>
    </form>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    var listEl = document.getElementById('chat-messages');
    var formEl = document.getElementById('chat-form');
    var inputEl = document.getElementById('chat-input');
    var noticeEl = document.getElementById('chat-notice');
    var readKey = 'chatLastReadId';
    var lastId = 0;
    var firstLoadDone = false;

    // --- Permissão de notificação: solicita na primeira interação do utilizador ---
    function requestNotifPermission() {
        if ('Notification' in window && Notification.permission === 'default') {
            Notification.requestPermission();
        }
    }
    document.addEventListener('click', requestNotifPermission, { once: true });

    // --- Som via Web Audio API (sem ficheiro externo) ---
    var audioCtx = null;
    function getAudioCtx() {
        if (!audioCtx) {
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            } catch(e) { return null; }
        }
        // Retoma contexto suspenso (política de autoplay)
        if (audioCtx.state === 'suspended') {
            audioCtx.resume().catch(function(){});
        }
        return audioCtx;
    }
    // Desbloqueia o contexto de áudio na primeira interação
    document.addEventListener('click', function() { getAudioCtx(); }, { once: true });

    function playNotificationSound() {
        var ctx = getAudioCtx();
        if (!ctx) return;
        try {
            var gain = ctx.createGain();
            gain.connect(ctx.destination);

            // Dois tons suaves: "ding-dong"
            [880, 660].forEach(function(freq, i) {
                var osc = ctx.createOscillator();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, ctx.currentTime + i * 0.18);
                osc.connect(gain);
                gain.gain.setValueAtTime(0, ctx.currentTime + i * 0.18);
                gain.gain.linearRampToValueAtTime(0.25, ctx.currentTime + i * 0.18 + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.18 + 0.35);
                osc.start(ctx.currentTime + i * 0.18);
                osc.stop(ctx.currentTime + i * 0.18 + 0.4);
            });
        } catch(e) {}
    }

    // --- Notificação desktop / mobile ---
    function showChatNotification(senderName, preview) {
        var title = 'Nova mensagem de ' + senderName;
        var body = preview.length > 80 ? preview.slice(0, 77) + '…' : preview;

        // Prefere Service Worker (funciona em background / mobile PWA)
        if ('serviceWorker' in navigator && navigator.serviceWorker.controller) {
            navigator.serviceWorker.controller.postMessage({
                type: 'SHOW_NOTIFICATION',
                title: title,
                body: body
            });
            return;
        }
        // Fallback: Notification API directa
        if ('Notification' in window && Notification.permission === 'granted') {
            new Notification(title, {
                body: body,
                icon: '/static/icons/icon-192x192.png',
                tag: 'chat-message',
                renotify: true
            });
        }
    }

    function persistLastRead() {
        if (lastId > 0) {
            localStorage.setItem(readKey, String(lastId));
        }
    }

    function escapeHtml(raw) {
        return (raw || '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/\"/g, '&quot;')
            .replace(/'/g, '&#039;');
    }

    function shouldStickToBottom() {
        var threshold = 60;
        return (listEl.scrollHeight - listEl.scrollTop - listEl.clientHeight) < threshold;
    }

    function renderMessage(msg) {
        var item = document.createElement('div');
        item.className = 'chat-message' + (msg.is_me ? ' mine' : '');
        item.setAttribute('data-id', String(msg.id));

        item.innerHTML =
            '<div class="chat-meta">' +
                '<strong>' + escapeHtml(msg.sender_nome) + '</strong>' +
                '<span>' + escapeHtml(msg.created_at) + '</span>' +
            '</div>' +
            '<p>' + escapeHtml(msg.content) + '</p>';

        listEl.appendChild(item);
        if (msg.id > lastId) {
            lastId = msg.id;
        }
    }

    function fetchMessages() {
        var stick = shouldStickToBottom();
        fetch('/api/chat/messages?after_id=' + encodeURIComponent(lastId))
            .then(function(resp) { return resp.json(); })
            .then(function(data) {
                if (!data.ok || !Array.isArray(data.messages)) return;
                var hasIncoming = false;
                data.messages.forEach(renderMessage);
                if (firstLoadDone) {
                    hasIncoming = data.messages.some(function(msg) { return !msg.is_me; });
                }
                if (stick) {
                    listEl.scrollTop = listEl.scrollHeight;
                }

                if (hasIncoming) {
                    noticeEl.style.display = '';
                    playNotificationSound();
                    // Monta preview com o remetente da primeira mensagem nova
                    var firstNew = data.messages.find(function(m) { return !m.is_me; });
                    if (firstNew) {
                        showChatNotification(
                            firstNew.sender_nome,
                            firstNew.content
                        );
                    }
                }

                persistLastRead();

                if (!firstLoadDone) {
                    firstLoadDone = true;
                }
            })
            .catch(function() {
                // silencioso
            });
    }

    window.addEventListener('agendadia:chat-updated', function() {
        fetchMessages();
    });

    formEl.addEventListener('submit', function(e) {
        e.preventDefault();
        var content = (inputEl.value || '').trim();
        if (!content) return;

        fetch('/api/chat/send', {
            method: 'POST',
            headers: window.buildCsrfHeaders({ 'Content-Type': 'application/json' }),
            body: JSON.stringify({ content: content })
        })
        .then(function(resp) { return resp.json(); })
        .then(function(data) {
            if (!data.ok || !data.message) return;
            inputEl.value = '';
            noticeEl.style.display = 'none';
            renderMessage(data.message);
            persistLastRead();
            listEl.scrollTop = listEl.scrollHeight;
        })
        .catch(function() {
            // silencioso
        });
    });

    fetchMessages();
    setInterval(fetchMessages, 4000);
});
</script>
{% endblock %}
