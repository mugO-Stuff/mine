<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bom Dia</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- Manifest PWA -->
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <meta name="theme-color" content="#1976d2">

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" sizes="192x192" href="{{ url_for('static', filename='icons/icon-192x192.png') }}">
    <!-- Favicon para desktop e mobile -->
    <link rel="icon" type="image/png" sizes="192x192" href="{{ url_for('static', filename='icons/icon-192x192.png') }}">
    <link rel="icon" type="image/png" sizes="512x512" href="{{ url_for('static', filename='icons/icon-512x512.png') }}">
    <link rel="shortcut icon" href="{{ url_for('static', filename='icons/icon-192x192.png') }}">
    <!-- Apple Touch Icons para iOS -->
    <link rel="apple-touch-icon" sizes="192x192" href="{{ url_for('static', filename='icons/icon-192x192.png') }}">
    <link rel="apple-touch-icon" sizes="512x512" href="{{ url_for('static', filename='icons/icon-512x512.png') }}">
</head>
<body>
    <header>
        <h1>AGENDAMENTOS</h1>
        <nav class="header-nav">
        {% if current_user %}
            {% if current_user.cargo == 'admin' or current_user.grau == 3 %}
                <a href="{{ url_for('admin') }}">Admin</a>
            {% endif %}
            <a href="{{ url_for('pacientes') }}">Pacientes</a>
            <a href="{{ url_for('perfil') }}">Perfil</a>
            <a href="{{ url_for('logout') }}">Sair</a>
        {% else %}
            <a href="{{ url_for('login') }}">Entrar</a>
        {% endif %}
        </nav>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    <!-- Antes do fechamento do </body> -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('{{ url_for("static", filename="service-worker.js") }}')
            .then(function(reg) {
              // Sucesso
            }).catch(function(err) {
              // Falha
            });
        });
      }
    </script>
    <footer class="footer-fixed">
        © 2026 Hospital Esplanda — Todos os direitos reservados a &lt;mugO Santos&gt;
    </footer>
</body>
</html>
