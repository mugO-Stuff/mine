<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bom Dia</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css', v=asset_version) }}">

    <!-- PWA / Android -->
    <link rel="manifest" href="{{ url_for('web_manifest') }}">
    <meta name="theme-color" content="#1976d2">
    <meta name="mobile-web-app-capable" content="yes">

    <!-- iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="AgendaDia">
    <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='icons/icon-180x180.png') }}">

    <!-- Favicon / desktop -->
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', filename='icons/icon-16x16.png') }}">
    <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='icons/icon-32x32.png') }}">
    <link rel="icon" type="image/png" sizes="192x192" href="{{ url_for('static', filename='icons/icon-192x192.png') }}">
    <link rel="icon" type="image/png" sizes="512x512" href="{{ url_for('static', filename='icons/icon-512x512.png') }}">
    <link rel="shortcut icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
</head>
<body>
    <header>
        <h1>AGENDAMENTOS</h1>
        <nav class="header-nav">
        {% if current_user %}
            {% if current_user.cargo == 'admin' or current_user.grau == 3 %}
                <a href="{{ url_for('admin') }}">Admin</a>
            {% endif %}
            <a href="{{ url_for('pacientes') }}">Pacientes</a>
            <a href="{{ url_for('perfil') }}">Perfil</a>
            <a href="{{ url_for('logout') }}">Sair</a>
        {% else %}
            <a href="{{ url_for('login') }}">Entrar</a>
        {% endif %}
        </nav>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    <!-- Antes do fechamento do </body> -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('{{ url_for("service_worker") }}')
            .then(function(reg) {
              // Sucesso
            }).catch(function(err) {
              // Falha
            });
        });
      }
    </script>
    <footer class="footer-fixed">
        © 2026 Hospital Esplanda — Todos os direitos reservados a &lt;mugO Santos&gt;
    </footer>
</body>
</html>
